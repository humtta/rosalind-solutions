# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

silent: true

tasks:
  format:
    desc: Run all format tasks
    cmds:
      - task format:go
      - task format:py

  # Go-related tasks
  format:go:
    desc: Formats Go code
    cmd: gofmt -w .

  # Python-related tasks
  format:py:
    desc: Formats Python code
    cmd: ruff format .
  lint:py:
    desc: Lints Python code
    cmd: ruff check .
  check:py:
    desc: Formats and lints Python code
    cmds:
      - task format:py
      - task lint:py
